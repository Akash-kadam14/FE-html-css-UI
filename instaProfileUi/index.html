<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Insta Profile UI</title>
  </head>
  <body>
    <div class="card">
      <div class="statusBar">
        <span class="time">9:41</span>
        <div class="stausIcons">
          <i class="fa-solid fa-signal"></i>
          <i class="fa-solid fa-wifi"></i>
          <i class="fa-solid fa-battery-full"></i>
        </div>
      </div>
      <h2 id="heading">akash_kadam</h2>
      <div class="profilePicCard">
        <div class="profilePic">
          <img src="IMG_9262.JPG" alt="akash" />
        </div>
        <div class="profileInfo">
          <div class="profileData">
            <div id="posts">
              1427
              <div>Posts</div>
            </div>
            <div id="followers">
              898
              <div>Followers</div>
            </div>
            <div id="following">
              1310
              <div>Following</div>
            </div>
          </div>
        </div>
      </div>
      <div class="bio">
        <h4>Akash Kadam</h4>
        <p>
          Most of these photos are developed and scanned at home by hand 📷
          <br />
          SF,CA
        </p>
        <a href="http://akash-kadam.com">www.akashkadam.com</a>
        <br />
        <button>Edit Profile</button>
      </div>
      <div class="allPosts">
        <div class="tabItem active">
          <i class="fa-sharp fa-solid fa-border-all"></i>
        </div>
        <div class="tabItem">
          <i class="fa-regular fa-id-badge"></i>
        </div>
      </div>
      <div class="postContainer">
        <div class="item one"><img src="IMG_9262.JPG" alt="akash" /></div>
        <div class="item two"><img src="IMG_9297.JPG" alt="akash" /></div>
        <div class="item three"><img src="IMG_9300.JPG" alt="akash" /></div>
        <div class="item four"><img src="IMG_9301.JPG" alt="akash" /></div>
        <div class="item five"><img src="IMG_9347.JPG" alt="akash" /></div>
        <div class="item six"><img src="IMG_9362.JPG" alt="akash" /></div>
        <div class="item seven"><img src="IMG_9572.JPG" alt="akash" /></div>
        <div class="item eight"><img src="IMG_9612.JPG" alt="akash" /></div>
        <div class="item nine"><img src="IMG_9952.JPG" alt="akash" /></div>
      </div>
      <div class="footerIcons">
        <div class="footerIcon">
          <i class="fa-solid fa-house"></i>
        </div>
        <div class="footerIcon">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <div class="footerIcon"><i class="fa-regular fa-square-plus"></i></div>
        <div class="footerIcon"><i class="fa-regular fa-heart"></i></div>
        <div class="footerIcon active"><i class="fa-regular fa-user"></i></div>
      </div>
    </div>
  </body>
</html>
